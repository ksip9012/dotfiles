"$schema" = 'https://starship.rs/config-schema.json'

# ============================================================
# CORE SETTINGS
# ============================================================
format = """
[’Æē  ](base0E)$os$sudo$directory$status$cmd_duration$battery$fill$git_branch$git_status$c$golang$nodejs$php$docker_context$python$time
$character """

palette = "custom"
# ============================================================
# SHELL UI
# ============================================================
[character]
success_symbol = '[ŌØ»](bold fg:base0B)'
error_symbol = '[ŌØ»](bold fg:base08)'
disabled = false

[status]
style = "fg:base0B"
format = '[$symbol]($style)'
success_symbol = "[ ’üØ ]($style)"
symbol = "[ ’ü£ $status $common_meaning](bold fg:red)"
disabled = false

[time]
time_format = "%y-%m-%d(%a) %R"
style = "base04"
format = '[ $time ]($style)'
disabled = false

[sudo]
style = 'base0E'
format = "[¾░åź sudo ]($style)"
disabled = false

# ============================================================
# SYSTEM / HARDWARE
# ============================================================
[battery]
full_symbol = "¾░ü╣ "
charging_symbol = "¾░éä "
discharging_symbol = "¾░éā "
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 30
style = "bold red"

[cmd_duration]
min_time = 700
show_milliseconds = true
style = "base09"
format = "[ ¾░Šå $duration ]($style)"
show_notifications = true
min_time_to_notify = 45000

[os]
disabled = false
style = "base0E"

# ============================================================
# DIRECTORY & GIT
# ============================================================
[directory]
style = "base0D"
format = "[ ’ōö $path ]($style)"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "ŌĆ”/"
read_only = " ¾░īŠ"
home_symbol = "¾░ŗ£ "

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "

[git_branch]
symbol = "’Éś"
style = "base0E"
format = '[$symbol $branch ]($style)'
truncation_length = 20
truncation_symbol = "ŌĆ”"

[git_status]
format = '$conflicted$stashed$deleted$renamed$modified$staged$untracked$ahead_behind'

conflicted = "[Ō£ś ](fg:base08)"
deleted    = "[Ō£ś ](fg:base08)"
modified   = "[! ](fg:base09)"
staged     = "[+ ](fg:base0B)"
untracked  = "[? ](fg:base0C)"
renamed    = "[┬╗ ](fg:base0D)"
ahead      = "[ŌćĪ ](fg:base0A)"
behind     = "[ŌćŻ ](fg:base0A)"
diverged   = "[ŌćĢ ](fg:base08)"
stashed    = "[ŌēĪ ](fg:base0F)"

# ============================================================
# LANGUAGES & TOOLS (Alphabetical Order)
# ============================================================
[c]
symbol = "Ņś× "
style = "base0C"
format = '[| $symbol( $version) ]($style)'

[docker_context]
