"$schema" = 'https://starship.rs/config-schema.json'

# ============================================================
# CORE SETTINGS
# ============================================================
format = """
[  ](base0E)$os$sudo$directory$status$cmd_duration$battery$fill$git_branch$git_status$c$golang$nodejs$php$docker_context$python$time
$character """

palette = "custom"
# ============================================================
# SHELL UI
# ============================================================
[character]
success_symbol = '[❯](bold fg:base0B)'
error_symbol = '[❯](bold fg:base08)'
disabled = false

[status]
style = "fg:base0B"
format = '[$symbol]($style)'
success_symbol = "[  ]($style)"
symbol = "[  $status $common_meaning](bold fg:red)"
disabled = false

[time]
time_format = "%y-%m-%d(%a) %R"
style = "base04"
format = '[ $time ]($style)'
disabled = false

[sudo]
style = 'base0E'
format = "[󰆥 sudo ]($style)"
disabled = false

# ============================================================
# SYSTEM / HARDWARE
# ============================================================
[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 30
style = "bold red"

[cmd_duration]
min_time = 700
show_milliseconds = true
style = "base09"
format = "[ 󰾆 $duration ]($style)"
show_notifications = true
min_time_to_notify = 45000

[os]
disabled = false
style = "base0E"

# ============================================================
# DIRECTORY & GIT
# ============================================================
[directory]
style = "base0D"
format = "[  $path ]($style)"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " 󰌾"
home_symbol = "󰋜 "

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "

[git_branch]
symbol = ""
style = "base0E"
format = '[$symbol $branch ]($style)'
truncation_length = 20
truncation_symbol = "…"

[git_status]
format = '$conflicted$stashed$deleted$renamed$modified$staged$untracked$ahead_behind'

conflicted = "[✘ ](fg:base08)"
deleted    = "[✘ ](fg:base08)"
modified   = "[! ](fg:base09)"
staged     = "[+ ](fg:base0B)"
untracked  = "[? ](fg:base0C)"
renamed    = "[» ](fg:base0D)"
ahead      = "[⇡ ](fg:base0A)"
behind     = "[⇣ ](fg:base0A)"
diverged   = "[⇕ ](fg:base08)"
stashed    = "[≡ ](fg:base0F)"

# ============================================================
# LANGUAGES & TOOLS (Alphabetical Order)
# ============================================================
[c]
symbol = " "
style = "base0C"
format = '[| $symbol( $version) ]($style)'

[docker_context]
symbol = ""
style = "base0C"
format = '[| $symbol( $context) ]($style)'

[golang]
symbol = ""
style = "base0C"
format = '[| $symbol( $version) ]($style)'

[nodejs]
symbol = ""
style = "base0C"
format = '[| $symbol( $version) ]($style)'

[php]
symbol = ""
style = "base0C"
format = '[| $symbol( $version) ]($style)'

[python]
symbol = ""
style = "bg:base01 fg:base0A"
format = '[| $symbol( $version) ( $virtualenv)]($style)'

# ============================================================
# FILL
# ============================================================
[fill]
symbol = "─"
style = "fg:base03"

# ============================================================
# COLOR PALETTES
# ============================================================
# このセクションは theme/generate.py で自動生成されます。直接編集しないこと
[palettes.custom]
base00 = "#0f1a1f"
base01 = "#1b2b34"
base02 = "#223945"
base03 = "#5a6e75"
base04 = "#8fa1a8"
base05 = "#cbd6dc"
base06 = "#dce6db"
base07 = "#ecf4f8"
base08 = "#bf8b56"
base09 = "#d9a066"
base0A = "#bfbf56"
base0B = "#56bf8b"
base0C = "#56bfbf"
base0D = "#568bbf"
base0E = "#8b56bf"
base0F = "#bfa68b"
