"$schema" = 'https://starship.rs/config-schema.json'

# ============================================================
# CORE SETTINGS
# ============================================================
format = """
[’Æē ](mauve)$os$sudo $directory$status$cmd_duration $time
$git_branch $git_status $python
$character """

palette = 'catppuccin_mocha'
# ============================================================
# SHELL UI
# ============================================================
[character]
success_symbol = '[ŌØ»](bold fg:sapphire)'
error_symbol = '[ŌØ»](bold fg:red)'
disabled = false

[line_break]
disabled = true

[status]
style = "fg:green"
format = '[$symbol]($style)'
success_symbol = "[ ’üØ ]($style)"
symbol = "[ ’ü£ $status $common_meaning](bold fg:red)"
disabled = false

[time]
time_format = "%y-%m-%d(%a) %R"
style = "lavender"
format = '[ $time ]($style)'
disabled = false

[sudo]
style = 'mauve'
format = "[¾░åź ]($style)"
disabled = false

# ============================================================
# SYSTEM / HARDWARE
# ============================================================
[battery]
full_symbol = "¾░ü╣ "
charging_symbol = "¾░éä "
discharging_symbol = "¾░éā "
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 30
style = "bold red"

[cmd_duration]
min_time = 700
show_milliseconds = true
style = "fg:rosewater"
format = "[ ¾░Šå $duration ]($style)"
show_notifications = true
min_time_to_notify = 45000

[os]
disabled = false
style = "fg:mauve"

# ============================================================
# DIRECTORY & GIT
# ============================================================
[directory]
style = "blue"
format = "[ ’ōö $path |]($style)"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "ŌĆ”/"
read_only = " ¾░īŠ"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "

[git_branch]
symbol = "’Éś"
style = "sapphire"
format = '[$symbol $branch ]($style)'

[git_status]
style = "sapphire"
format = '[$conflicted$deleted$renamed$modified$staged$untracked$ahead_behind]($style)'
untracked = "? "
stashed = "$ "
modified = "! "
staged = "+ "
renamed = "┬╗ "
deleted = "Ō£ś "
ahead = "ŌćĪ "
behind = "ŌćŻ "
diverged = "ŌćĢ "
up_to_date = 'Ō£ō '

# ============================================================
# LANGUAGES & TOOLS (Alphabetical Order)
# ============================================================
[c]
symbol = "Ņś× "
style = "fg:teal"
format = '[ $symbol( $version) |]($style)'

[docker_context]
symbol = "’īł"
style = "fg:teal"
format = '[ $symbol( $context) |]($style)'

[golang]
symbol = "Ņś¦"
style = "fg:teal"
format = '[ $symbol( $version) |]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "fg:teal"
format = '[ $symbol( $version) |]($style)'

[php]
