# Aerospace - Tiling Window Manager
# Modifier: Alt (Option)
# 方向操作は vim キー (hjkl) に統一

# 起動時に自動でタイリングを適用
after-startup-command = ['layout tiling']

# スクリーン端でフォーカスを折り返す
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.right      = 8
outer.top        = 8
outer.bottom     = 8

# --------------------------------------------------
# メインモード
# --------------------------------------------------
[mode.main.binding]

# フォーカス移動
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# ウィンドウ移動
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# レイアウト切り替え (horizontal / vertical トグル)
alt-slash = 'layout tiles horizontal vertical'

# フローティング / タイリング トグル
alt-shift-space = 'layout floating tiling'

# フルスクリーン
alt-shift-f = 'fullscreen'

# ウィンドウを画面中央に寄せる (フローティング時)
alt-shift-c = 'move-mouse window-lazy-center'

# リサイズモードへ
alt-r = 'mode resize'

# ワークスペース切り替え (alt + 数字)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

# ウィンドウを別ワークスペースへ移動 (alt-shift + 数字)
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'

# モニター間のフォーカス移動
alt-shift-tab = 'move-mouse monitor-lazy-center'

# --------------------------------------------------
# リサイズモード (alt-r で入る / Esc で抜ける)
# --------------------------------------------------
[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
esc = 'mode main'
enter = 'mode main'
